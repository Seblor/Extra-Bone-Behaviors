<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="36" fill="#0d1117"/>

  <!-- Subtle center glow -->
  <circle cx="128" cy="128" r="112" fill="url(#bgGlow)"/>

  <!-- Bone shadow/glow -->
  <g transform="rotate(-15, 128, 128)" filter="url(#soft)" opacity="0.5">
    <circle cx="70"  cy="113" r="17" fill="#4a9eff"/>
    <circle cx="70"  cy="143" r="17" fill="#4a9eff"/>
    <circle cx="186" cy="113" r="17" fill="#4a9eff"/>
    <circle cx="186" cy="143" r="17" fill="#4a9eff"/>
    <rect x="70" y="121" width="116" height="14" fill="#4a9eff"/>
  </g>

  <!-- Bone (tilted -15°) -->
  <g transform="rotate(-15, 128, 128)">
    <!-- Left knobs -->
    <circle cx="70"  cy="113" r="17" fill="#c8d8e8"/>
    <circle cx="70"  cy="143" r="17" fill="#c8d8e8"/>
    <!-- Right knobs -->
    <circle cx="186" cy="113" r="17" fill="#c8d8e8"/>
    <circle cx="186" cy="143" r="17" fill="#c8d8e8"/>
    <!-- Shaft -->
    <rect x="70" y="121" width="116" height="14" fill="#c8d8e8"/>
    <!-- Highlights -->
    <rect x="88" y="122" width="80" height="4" rx="2" fill="#e8f4ff" opacity="0.5"/>
    <circle cx="70"  cy="109" r="7" fill="#e8f4ff" opacity="0.25"/>
    <circle cx="186" cy="109" r="7" fill="#e8f4ff" opacity="0.25"/>
  </g>

  <!-- Sparkle — top right (blue +) -->
  <g transform="translate(200, 72)">
    <rect x="-2.5" y="-11" width="5" height="22" rx="2.5" fill="#4a9eff"/>
    <rect x="-11"  y="-2.5" width="22" height="5" rx="2.5" fill="#4a9eff"/>
  </g>

  <!-- Sparkle — bottom left (amber +) -->
  <g transform="translate(56, 184)">
    <rect x="-2"  y="-9"  width="4" height="18" rx="2" fill="#ffaa4a"/>
    <rect x="-9"  y="-2"  width="18" height="4" rx="2" fill="#ffaa4a"/>
  </g>

  <!-- Sparkle — top left (green ×) -->
  <g transform="translate(74, 68) rotate(45)">
    <rect x="-1.5" y="-7"  width="3" height="14" rx="1.5" fill="#4aff9a" opacity="0.8"/>
    <rect x="-7"   y="-1.5" width="14" height="3" rx="1.5" fill="#4aff9a" opacity="0.8"/>
  </g>

  <!-- Sparkle — bottom right (amber ×) -->
  <g transform="translate(186, 192) rotate(45)">
    <rect x="-1.5" y="-7"  width="3" height="14" rx="1.5" fill="#ffaa4a" opacity="0.8"/>
    <rect x="-7"   y="-1.5" width="14" height="3" rx="1.5" fill="#ffaa4a" opacity="0.8"/>
  </g>

  <!-- Small dots -->
  <circle cx="155" cy="62"  r="3.5" fill="#4a9eff"  opacity="0.6"/>
  <circle cx="218" cy="148" r="2.5" fill="#4a9eff"  opacity="0.5"/>
  <circle cx="100" cy="196" r="3"   fill="#ffaa4a" opacity="0.6"/>
  <circle cx="40"  cy="114" r="2"   fill="#4aff9a" opacity="0.5"/>
  <circle cx="172" cy="204" r="2"   fill="#4a9eff"  opacity="0.4"/>
  <circle cx="220" cy="90"  r="2"   fill="#ffaa4a" opacity="0.4"/>
</svg>
